<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoSpec · Client Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Light theme (default) */
        body.light {
            background: #f8fafc;
            color: #0f172a;
        }

        body.light .card {
            background: white;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        body.light input {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #0f172a;
        }

        body.light button.primary {
            background: #0f172a;
            color: white;
        }

        body.light button.secondary {
            background: #e2e8f0;
            color: #0f172a;
        }

        /* Dark theme */
        body.dark {
            background: #0b1120;
            color: #e2e8f0;
        }

        body.dark .card {
            background: #1e293b;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        body.dark input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f1f5f9;
        }

        body.dark button.primary {
            background: #3b82f6;
            color: white;
        }

        body.dark button.secondary {
            background: #334155;
            color: #f1f5f9;
        }

        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: 1px solid currentColor;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            opacity: 0.8;
            transition: 0.2s;
        }

        .theme-toggle:hover {
            opacity: 1;
        }

        .card {
            max-width: 440px;
            width: 100%;
            padding: 2.5rem 2rem;
            border-radius: 2rem;
            transition: all 0.3s;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            opacity: 0.7;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 1.2rem;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            margin: 2rem 0 1.5rem;
        }

        button {
            flex: 1;
            padding: 0.9rem;
            border: none;
            border-radius: 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active {
            transform: scale(0.97);
        }

        .footer-note {
            text-align: center;
            font-size: 0.85rem;
            opacity: 0.6;
        }

        .message {
            text-align: center;
            margin: 1rem 0;
            padding: 0.8rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: rgba(34,197,94,0.15);
            color: #22c55e;
        }

        .message.error {
            background: rgba(239,68,68,0.15);
            color: #ef4444;
        }
    </style>
</head>
<body class="light">
    <button class="theme-toggle" id="themeToggle">🌓 Switch theme</button>

    <div class="card">
        <h1>motospec</h1>
        <div class="subtitle">client portal · sign in to manage products</div>

        <div class="message" id="message"></div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="client@example.com" autocomplete="off">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="btn-group">
            <button class="secondary" id="signUpBtn">Sign up</button>
            <button class="primary" id="signInBtn">Log in</button>
        </div>

        <div class="footer-note">
            new? sign up first — verify email, then log in.
        </div>
    </div>

    <script>
        // ========== FIREBASE CONFIG ==========
        const firebaseConfig = {
            apiKey: "AIzaSyCi0sodw0gRs0fNllMZbODIKpxxj4gwdos",
            authDomain: "motospec-system.firebaseapp.com",
            projectId: "motospec-system",
            storageBucket: "motospec-system.firebasestorage.app",
            messagingSenderId: "944522359083",
            appId: "1:944522359083:web:65b0706d8aadd4a63f556e",
            measurementId: "G-TP1EQWSYZJ"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // ========== THEME TOGGLE ==========
        const body = document.body;
        const themeToggle = document.getElementById('themeToggle');
        
        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        body.className = savedTheme;
        
        themeToggle.addEventListener('click', () => {
            const newTheme = body.className === 'light' ? 'dark' : 'light';
            body.className = newTheme;
            localStorage.setItem('theme', newTheme);
        });

        // ========== MESSAGE HELPER ==========
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type} show`;
            setTimeout(() => msg.classList.remove('show'), 4000);
        }

        // ========== SIGN UP ==========
        document.getElementById('signUpBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('fill in both fields', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('password must be at least 6 characters', 'error');
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((cred) => {
                    cred.user.sendEmailVerification();
                    showMessage('verification email sent! check inbox', 'success');
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                })
                .catch(err => showMessage(err.message, 'error'));
        });

        // ========== SIGN IN ==========
        document.getElementById('signInBtn').addEventListener('click', () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showMessage('fill in both fields', 'error');
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((cred) => {
                    if (cred.user.emailVerified) {
                        window.location.href = 'dashboard.html';
                    } else {
                        showMessage('please verify your email first', 'error');
                        auth.signOut();
                    }
                })
                .catch(err => showMessage(err.message, 'error'));
        });

        // Redirect if already logged in
        auth.onAuthStateChanged(user => {
            if (user && user.emailVerified) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
